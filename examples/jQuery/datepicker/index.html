<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery DatePicker Example</title>
    <style>
      body {
        padding: 20px;
        font-family: sans-serif;
        color: #333;
      }
      .datepicker-wrapper {
        position: relative;
        margin-bottom: 20px;
      }
      .datepicker-popup {
        position: absolute;
        top: 100%;
        left: 0;
        z-index: 1000;
        background: white;
        border: 1px solid black;
        padding: 10px;
        display: none;
      }
      label {
        display: block;
      }
      table {
        border-collapse: collapse;
      }
      .day-cell {
        text-align: center;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <h1>jQuery DatePicker Example</h1>
    <p>This example shows a DatePicker component with minimal styling.</p>

    <form id="trip-form">
      <div class="datepicker-wrapper" id="departure-picker" data-label="Departure Date">
        <label>Departure Date</label>
        <input type="text" readonly placeholder="Select departure" class="datepicker-input" />
        <div class="datepicker-popup"></div>
      </div>

      <div class="datepicker-wrapper" id="return-picker" data-label="Return Date">
        <label>Return Date</label>
        <input type="text" readonly placeholder="Select return" class="datepicker-input" />
        <div class="datepicker-popup"></div>
      </div>

      <button type="submit">Check Availability</button>
    </form>

    <div style="margin-top: 20px">
      <h3>Selection State:</h3>
      <pre id="state-display"></pre>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
