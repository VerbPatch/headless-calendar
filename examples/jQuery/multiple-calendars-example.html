<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery Multiple Calendars Example</title>
    <style>
      body {
        padding: 20px;
        font-family: sans-serif;
        color: #333;
      }
      .calendars-container {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
      }
      .calendar-wrapper {
        border: 1px solid #ccc;
        padding: 16px;
        border-radius: 8px;
        width: 350px;
      }
      .view-switcher {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
      }
      .view-btn {
        flex: 1;
        padding: 4px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        text-transform: capitalize;
        background-color: #f0f0f0;
        color: #000;
      }
      .view-btn.active {
        background-color: #007bff;
        color: #fff;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .nav span {
        font-weight: bold;
        font-size: 14px;
      }
      .today-btn {
        width: 100%;
        margin-bottom: 15px;
        padding: 6px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: #fff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: center;
        padding: 4px;
        font-size: 14px;
      }
      th {
        font-size: 12px;
      }
      .day-cell.today {
        background-color: #e6f7ff;
        border-radius: 50%;
      }
      .day-cell.other-month {
        color: #ccc;
      }
      .day-cell.current-month {
        color: #000;
      }
      .week-view {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .week-range {
        font-size: 12px;
        color: #666;
        text-align: center;
        margin-bottom: 4px;
      }
      .week-dates {
        display: flex;
        justify-content: space-between;
        gap: 4px;
      }
      .week-date {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        border-radius: 4px;
        background-color: #f9f9f9;
        border: 1px solid #eee;
      }
      .week-date.today {
        background-color: #e6f7ff;
        border: 1px solid #007bff;
      }
      .day-view {
        text-align: center;
        padding: 20px;
        border-radius: 8px;
        background-color: #f9f9f9;
        border: 1px solid #eee;
      }
      .day-view.today {
        background-color: #e6f7ff;
        border: 1px solid #007bff;
      }
    </style>
  </head>

  <body>
    <h1>Multiple Calendars Example</h1>
    <p style="color: #666; margin-bottom: 30px">
      Each calendar below has a unique <code>calendarId</code> and maintains its own independent
      state (date, view, etc.).
    </p>

    <div class="calendars-container">
      <div
        id="calendar-left"
        class="calendar-wrapper"
        data-id="calendar-left"
        data-title="Left Calendar"
      ></div>
      <div
        id="calendar-right"
        class="calendar-wrapper"
        data-id="calendar-right"
        data-title="Right Calendar"
      ></div>
    </div>

    <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px">
      <h2>Default Calendar</h2>
      <p style="color: #666">
        This one uses the default ID. If you added another one without an ID, they would conflict.
      </p>
      <div
        id="default-calendar"
        class="calendar-wrapper"
        data-id="default-calendar"
        data-title="Standard Calendar"
      ></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@verbpatch/jquery-calendar/dist/index.umd.js"></script>
    <script>
      $(document).ready(function () {
        function setupCalendar(selector) {
          const $elem = $(selector);
          const id = $elem.data('id');
          const title = $elem.data('title');

          $elem.headlessCalendar({
            calendarId: id,
            defaultView: 'month',
            onRender: function (cal) {
              const { view, currentDate, monthData, weekData, dayData, utils } = cal;

              let html = `<h3 style="margin-top: 0; margin-bottom: 12px">${title} (ID: ${id})</h3>`;

              // View Switcher
              html += '<div class="view-switcher">';
              ['month', 'week', 'day'].forEach((viewType) => {
                const activeClass = view === viewType ? 'active' : '';
                html += `<button class="view-btn ${activeClass}" data-action="change-view" data-view="${viewType}">${viewType}</button>`;
              });
              html += '</div>';

              // Navigation
              const navText =
                view === 'day'
                  ? utils.formatLocalizedDate(currentDate)
                  : utils.formatLocalizedMonth(currentDate);

              html += `
                <div class="nav">
                  <button data-action="prev">←</button>
                  <span>${navText}</span>
                  <button data-action="next">→</button>
                </div>
                <button class="today-btn" data-action="today">Today</button>
                <div style="min-height: 200px">
              `;

              // Month View
              if (view === 'month' && monthData) {
                html += '<table><thead><tr>';
                utils.daysofWeek('narrow').forEach((day) => {
                  html += `<th>${day}</th>`;
                });
                html += '</tr></thead><tbody>';

                monthData.weeks.forEach((week) => {
                  html += '<tr>';
                  week.forEach((date) => {
                    const isCurrentMonth = monthData.isCurrentMonth(date);
                    const isToday = monthData.isToday(date);
                    const classes = ['day-cell'];
                    if (isToday) classes.push('today');
                    if (isCurrentMonth) classes.push('current-month');
                    else classes.push('other-month');

                    html += `<td class="${classes.join(' ')}">${utils.formatDate(date, 'd')}</td>`;
                  });
                  html += '</tr>';
                });
                html += '</tbody></table>';
              }
              // Week View
              else if (view === 'week' && weekData) {
                html += `
                  <div class="week-view">
                    <div class="week-range">${weekData.weekRange}</div>
                    <div class="week-dates">
                `;
                weekData.dates.forEach((date) => {
                  const isToday = weekData.isToday(date);
                  html += `
                    <div class="week-date ${isToday ? 'today' : ''}">
                      <div style="font-size: 10px; text-transform: uppercase; color: #888">
                        ${utils.formatLocalizedDate(date, undefined, undefined, { weekday: 'short' })}
                      </div>
                      <div style="font-weight: bold; font-size: 14px">
                        ${utils.formatDate(date, 'd')}
                      </div>
                    </div>
                  `;
                });
                html += '</div></div>';
              }
              // Day View
              else if (view === 'day' && dayData) {
                const isToday = dayData.isToday;
                html += `
                  <div class="day-view ${isToday ? 'today' : ''}">
                    <div style="font-size: 14px; color: #666; margin-bottom: 4px">
                      ${utils.formatLocalizedDate(currentDate, undefined, undefined, { weekday: 'long' })}
                    </div>
                    <div style="font-size: 32px; font-weight: bold">
                      ${utils.formatDate(currentDate, 'd')}
                    </div>
                    <div style="font-size: 14px; color: #666; margin-top: 4px">
                      ${utils.formatLocalizedMonth(currentDate)}
                    </div>
                  </div>
                `;
              }

              html += '</div>'; // End min-height
              $elem.html(html);
            },
          });

          // Event bindings
          $elem.on('click', 'button[data-action="prev"]', function () {
            $elem.headlessCalendar('goToPrevious');
          });
          $elem.on('click', 'button[data-action="next"]', function () {
            $elem.headlessCalendar('goToNext');
          });
          $elem.on('click', 'button[data-action="today"]', function () {
            $elem.headlessCalendar('goToToday');
          });
          $elem.on('click', 'button[data-action="change-view"]', function () {
            const newView = $(this).data('view');
            $elem.headlessCalendar('changeView', newView);
          });
        }

        setupCalendar('#calendar-left');
        setupCalendar('#calendar-right');
        setupCalendar('#default-calendar');
      });
    </script>
  </body>
</html>
